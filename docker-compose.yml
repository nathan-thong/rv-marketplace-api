services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: rv_marketplace
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rv_marketplace_production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rv_marketplace -d rv_marketplace_production"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "3000:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rv_marketplace:password@db:5432/rv_marketplace_production
      DB_HOST: db
      DB_USERNAME: rv_marketplace
      DB_PASSWORD: password
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      JWT_SECRET: ${JWT_SECRET}

volumes:
  postgres_data:
